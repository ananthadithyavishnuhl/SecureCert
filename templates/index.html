<!DOCTYPE html>
<html lang="">
<head>
<title>Certificate Verification System</title>
</head>
<body>
<h2>Issue Certificate</h2>
<form action="/issue" method="post">
Credential ID:<br>
<input name="credential_id"><br>
Name:<br>
<input name="name"><br>
Designation:<br>
<input name="designation"><br>
Course:<br>
<input name="course"><br>
Year:<br>
<input name="year"><br>
Expiry (optional):<br>
<input name="expiry"><br><br>
<button type="submit">Issue Certificate</button>
</form>
<hr>
<h2>Verify Certificate</h2>
<form action="/verify" method="post">
Credential ID:<br>
<input name="credential_id"><br><br>
<button type="submit">Verify</button>
</form>
<hr>
<h2>Delete Certificate</h2>
<form action="/delete" method="post">
Credential ID:<br>
<input name="credential_id"><br><br>
<button type="submit">Delete</button>
</form>
<hr>
<h2>Merkle Root</h2>
<a href="/merkle">Show Merkle Root</a>
</body>
</html>
